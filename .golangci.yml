# golangci-lint config. Mirrors the sibling repo baseline for small Go modules.
version: "2"
run:
  modules-download-mode: readonly
  tests: true
linters:
  default: none
  enable:
    - contextcheck
    - cyclop
    - decorder
    - gocritic
    - govet
    - staticcheck
  settings:
    cyclop:
      max-complexity: 15
      package-average: 0
    decorder:
      disable-dec-num-check: true
      disable-dec-order-check: true
      disable-init-func-first-check: true
    gocritic:
      disabled-checks:
        - paramTypeCombine
        - commentedOutCode
        - hugeParam
        - rangeValCopy
        - builtinShadow
        - regexpSimplify
        - importShadow
      enabled-tags:
        - diagnostic
        - performance
        - style
    staticcheck:
      checks:
        - SA*
  exclusions:
    generated: lax
    rules:
      - linters:
          - cyclop
        path: (.+)_test\.go
      - linters:
          - gocritic
          - govet
          - staticcheck
        path: vendor/
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
